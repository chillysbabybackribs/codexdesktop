<style>
/* doc-render canonical stylesheet — dark, high-contrast, professional.
   Verified against wide (12-col) GFM tables 2026-07-19. */
* { box-sizing: border-box; }
html { scroll-padding-top: 16px; }
body {
  margin: 0 auto; padding: 48px 40px 96px;
  font: 15px/1.65 -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  color: #e8e8e8; background: #191919;
  max-width: 1180px;
}
#title-block-header { display: none; } /* pandoc -s duplicates the doc H1 */

h1 { font-size: 30px; line-height: 1.2; margin: 0 0 4px; letter-spacing: -0.01em; }
h2 { font-size: 22px; margin: 44px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #333; letter-spacing: -0.01em; }
h3 { font-size: 17px; margin: 30px 0 8px; color: #f2f2f2; }
p, li { color: #cfcfcf; }
li { margin: 4px 0; }
strong { color: #ffffff; font-weight: 600; }
a { color: #6db3f2; text-decoration: none; }
a:hover { text-decoration: underline; }

code {
  font: 12.5px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  color: #ffd28e; background: #2a2a2a; border: 1px solid #383838;
  padding: 1px 6px; border-radius: 5px; white-space: nowrap;
}
a code { color: #6db3f2; }
pre { background: #202020; border: 1px solid #333; border-radius: 8px; padding: 14px 16px; overflow-x: auto; }
pre code { background: none; border: none; padding: 0; white-space: pre; color: #dcdcdc; }

blockquote { margin: 16px 0; padding: 10px 18px; border-left: 3px solid #555; background: #202020; border-radius: 0 8px 8px 0; color: #b8b8b8; }
hr { border: none; border-top: 1px solid #333; margin: 40px 0; }

/* Tables: no zebra striping (reads as "disabled rows" on dark), wide tables
   scroll within themselves, sticky header row + sticky first column so row
   labels never scroll out of view, force left alignment over GFM `---:`. */
table { border-collapse: collapse; width: 100%; margin: 18px 0 28px; font-size: 13.5px; line-height: 1.5; display: block; overflow-x: auto; max-width: 100%; }
th, td { text-align: left !important; padding: 10px 14px; vertical-align: top; }
th { position: sticky; top: 0; background: #242424; color: #fff; font-weight: 600; border-bottom: 2px solid #4a4a4a; white-space: nowrap; }
td { border-bottom: 1px solid #2e2e2e; color: #d6d6d6; }
td:first-child { color: #fff; font-weight: 600; min-width: 130px; }
th:first-child, td:first-child { position: sticky; left: 0; background: #191919; z-index: 1; box-shadow: 2px 0 4px rgba(0,0,0,.5); }
th:first-child { background: #242424; z-index: 2; }
tr:hover td { background: #1f1f1f; }
td code { white-space: normal; }
</style>
