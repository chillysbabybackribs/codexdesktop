<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <title>Browser menu</title>
    <style>
      /* Row/card metrics are mirrored in src/main/browser/browser-menu-popup.ts
         (ACTION_ROW_HEIGHT / ZOOM_ROW_HEIGHT / SEPARATOR_HEIGHT / CARD_CHROME /
         SHADOW_SPACE / MENU_WIDTH) — keep them in sync. */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        background: transparent;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        user-select: none;
      }

      #card {
        margin: 0 2px 14px;
        padding: 6px 0;
        border: 1px solid rgb(255 255 255 / 11%);
        border-radius: 10px;
        background: #1b1b1c;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 4%), 0 8px 18px rgb(0 0 0 / 38%);
      }

      .row {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr) 20px;
        align-items: center;
        height: 34px;
        padding-right: 10px;
        cursor: default;
        font-size: 13.5px;
        white-space: nowrap;
        color: #e9ebed;
      }

      .row:hover:not(.is-disabled) {
        background: #242527;
      }

      .row.is-disabled {
        color: #6a7076;
      }

      .row.is-disabled .row-icon {
        color: #565b60;
      }

      .row-icon {
        justify-self: center;
        width: 14px;
        height: 14px;
        color: #90979e;
      }

      .row-label {
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .row-check {
        justify-self: center;
        width: 13px;
        height: 13px;
        color: #90979e;
      }

      .separator {
        height: 9px;
        display: flex;
        align-items: center;
      }

      .separator::before {
        content: '';
        flex: 1;
        height: 1px;
        background: rgb(255 255 255 / 9%);
      }

      .zoom-row {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr) auto;
        align-items: center;
        height: 40px;
        padding-right: 10px;
        font-size: 13.5px;
        color: #e9ebed;
      }

      .zoom-controls {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .zoom-controls button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: #c8cdd2;
        cursor: default;
      }

      .zoom-controls button:hover:not(:disabled) {
        background: #2a2b2e;
      }

      .zoom-controls button:disabled {
        color: #565b60;
      }

      .zoom-controls .zoom-value {
        width: auto;
        min-width: 44px;
        padding: 0 4px;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .zoom-controls svg {
        width: 13px;
        height: 13px;
      }
    </style>
  </head>
  <body>
    <div id="card"></div>
    <script type="module" src="/src/browser-menu.ts"></script>
  </body>
</html>
