<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;"
    />
    <title>Suggestions</title>
    <style>
      /* Row/card metrics are mirrored in src/main/browser/omnibox-popup.ts
         (ROW_HEIGHT / CARD_CHROME / SHADOW_SPACE) — keep them in sync. */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        color-scheme: dark;
        --popup-surface: #1b1b1c;
        --popup-border: rgb(255 255 255 / 11%);
        --row-active: #262729;
        --row-hover: #232426;
        --text-strong: #eceef0;
        --text-muted: #858d95;
        --icon-surface: rgb(255 255 255 / 3.5%);
        --icon-border: rgb(255 255 255 / 7%);
      }

      html,
      body {
        background: transparent;
        overflow: hidden;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        user-select: none;
      }

      #card {
        margin: 0 2px 14px;
        padding: 6px 0;
        border: 1px solid var(--popup-border);
        border-radius: 10px;
        background: var(--popup-surface);
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 4%), 0 8px 18px rgb(0 0 0 / 38%);
      }

      .row {
        position: relative;
        display: grid;
        grid-template-columns: 42px minmax(0, auto) minmax(0, 1fr);
        align-items: center;
        height: 40px;
        padding-right: 14px;
        cursor: default;
        font-size: 13.5px;
        white-space: nowrap;
        transition: background 120ms ease;
      }

      .row:hover {
        background: var(--row-hover);
      }

      .row.is-selected {
        background: var(--row-active);
      }

      .row.is-selected::before {
        position: absolute;
        inset: 10px auto 10px 1px;
        width: 2px;
        border-radius: 2px;
        background: #c4c8cc;
        content: '';
      }

      .row-icon {
        display: grid;
        justify-self: center;
        width: 26px;
        height: 26px;
        place-items: center;
        border: 1px solid var(--icon-border);
        border-radius: 7px;
        background: var(--icon-surface);
        color: #90979e;
      }

      .row-favicon {
        display: block;
        width: 18px;
        height: 18px;
        border-radius: 4px;
        object-fit: contain;
      }

      .row-text {
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-strong);
        font-weight: 510;
        letter-spacing: -0.005em;
      }

      .row-detail {
        overflow: hidden;
        text-overflow: ellipsis;
        margin-left: 10px;
        color: var(--text-muted);
        font-size: 12.5px;
      }

      .row-detail:not(:empty)::before {
        content: '— ';
      }

      @media (prefers-reduced-motion: reduce) {
        .row {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="card"></div>
    <script type="module" src="/src/omnibox-popup.ts"></script>
  </body>
</html>
