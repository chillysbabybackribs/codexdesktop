<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <title>Calendar</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        overflow: hidden;
        background: transparent;
        color: #dfe3e7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        user-select: none;
      }
      button, select { font: inherit; }
      #card {
        width: calc(100% - 4px);
        margin: 0 2px 14px;
        padding: 12px;
        border: 1px solid rgb(255 255 255 / 12%);
        border-radius: 12px;
        background: #171718;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 5%), 0 18px 42px rgb(0 0 0 / 52%);
      }
      .heading {
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr) 32px;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }
      .nav {
        display: grid;
        width: 32px;
        height: 32px;
        padding: 0;
        place-items: center;
        border: 1px solid transparent;
        border-radius: 7px;
        background: transparent;
        color: #a8a8aa;
        cursor: default;
      }
      .nav:hover { border-color: rgb(255 255 255 / 7%); background: rgb(255 255 255 / 5%); color: #f0f0f0; }
      .nav svg { width: 15px; height: 15px; }
      .nav path { fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
      .caption { display: flex; min-width: 0; justify-content: center; gap: 3px; }
      .caption select {
        height: 30px;
        min-width: 0;
        padding: 0 4px;
        border: 1px solid transparent;
        border-radius: 6px;
        outline: none;
        background: transparent;
        color: #e3e3e4;
        font-size: 12px;
        font-weight: 650;
        cursor: default;
      }
      .caption select:first-child { width: 94px; }
      .caption select:last-child { width: 62px; }
      .caption select:hover, .caption select:focus-visible { border-color: rgb(255 255 255 / 12%); background: #212122; }
      .caption option { background: #212122; color: #dfe3e7; }
      .weekdays, #calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; }
      .weekdays { margin-bottom: 3px; }
      .weekdays span {
        display: grid;
        height: 22px;
        place-items: center;
        color: #717173;
        font-size: 9px;
        font-weight: 680;
        letter-spacing: .06em;
        text-transform: uppercase;
      }
      .day {
        position: relative;
        display: grid;
        width: 100%;
        min-width: 0;
        height: 34px;
        padding: 0;
        place-items: center;
        border: 1px solid transparent;
        border-radius: 7px;
        background: transparent;
        color: #c8c8ca;
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        cursor: default;
      }
      .day:hover { background: rgb(255 255 255 / 6%); color: #f3f3f3; }
      .day:focus-visible, .nav:focus-visible, #today:focus-visible {
        outline: none;
        border-color: rgb(255 255 255 / 15%);
        box-shadow: 0 0 0 2px rgb(255 255 255 / 18%);
      }
      .day.is-outside { color: #555557; }
      .day.is-today::after {
        position: absolute;
        bottom: 4px;
        left: 50%;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: #d8d8da;
        content: '';
        transform: translateX(-50%);
      }
      .day.is-selected {
        border-color: rgb(255 255 255 / 15%);
        background: #e4e4e6;
        color: #161617;
        font-weight: 700;
        box-shadow: inset 0 1px 0 rgb(255 255 255 / 45%);
      }
      .day.is-selected.is-today::after { background: #333335; }
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 38px;
        margin-top: 9px;
        padding-top: 9px;
        border-top: 1px solid rgb(255 255 255 / 7%);
      }
      #selected-label {
        overflow: hidden;
        color: #77777a;
        font-size: 9px;
        font-weight: 560;
        letter-spacing: .025em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #today {
        flex: 0 0 auto;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid rgb(255 255 255 / 12%);
        border-radius: 7px;
        background: #212122;
        color: #d7d7d9;
        font-size: 10px;
        font-weight: 660;
        cursor: default;
      }
      #today:hover { border-color: rgb(255 255 255 / 18%); background: #29292b; color: #fff; }
    </style>
  </head>
  <body>
    <div id="card" role="dialog" aria-label="Calendar">
      <div class="heading">
        <button id="previous-month" type="button" class="nav" aria-label="Previous month">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m10 3-5 5 5 5" /></svg>
        </button>
        <div class="caption">
          <select id="month" aria-label="Month"></select>
          <select id="year" aria-label="Year"></select>
        </div>
        <button id="next-month" type="button" class="nav" aria-label="Next month">
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="m6 3 5 5-5 5" /></svg>
        </button>
      </div>
      <div class="weekdays" aria-hidden="true">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div id="calendar-grid" role="grid" aria-label="Choose a date"></div>
      <div class="footer">
        <span id="selected-label"></span>
        <button id="today" type="button">Today</button>
      </div>
    </div>
    <script type="module" src="/src/titlebar-calendar-popup.ts"></script>
  </body>
</html>
